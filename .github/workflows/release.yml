name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-linux, aarch64-linux]
    steps:
      - uses: actions/checkout@v6

      # setup-zig's latest release (v2.2.1) is still Node 20; no Node 24 line
      # upstream yet. Node 20 code runs fine on the Node 24 runner, so this only
      # emits a deprecation warning, not a failure. Bump when upstream ships it.
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Determine version
        id: vars
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=nightly" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Package tarball
        run: |
          set -euo pipefail
          version="${{ steps.vars.outputs.version }}"
          target="${{ matrix.target }}"
          stage="zehn-${version}-${target}"
          mkdir -p "$stage"
          cp zig-out/bin/zehn "$stage/"
          [ -f README.md ] && cp README.md "$stage/" || true
          [ -f LICENSE ] && cp LICENSE "$stage/" || true
          tar -czf "${stage}.tar.gz" "$stage"
          sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.target }}
          path: |
            zehn-*.tar.gz
            zehn-*.tar.gz.sha256

  macos:
    name: Build macOS + dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      # setup-zig's latest release (v2.2.1) is still Node 20; no Node 24 line
      # upstream yet. Node 20 code runs fine on the Node 24 runner, so this only
      # emits a deprecation warning, not a failure. Bump when upstream ships it.
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Determine version
        id: vars
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=nightly" >> "$GITHUB_OUTPUT"
          fi

      - name: Build macOS targets and package tarballs
        run: |
          set -euo pipefail
          version="${{ steps.vars.outputs.version }}"
          for target in x86_64-macos aarch64-macos; do
            zig build -Doptimize=ReleaseFast -Dtarget="$target"
            stage="zehn-${version}-${target}"
            mkdir -p "$stage"
            cp zig-out/bin/zehn "$stage/"
            [ -f README.md ] && cp README.md "$stage/" || true
            [ -f LICENSE ] && cp LICENSE "$stage/" || true
            tar -czf "${stage}.tar.gz" "$stage"
            shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          done

      - name: Build dmg
        run: |
          set -euo pipefail
          version="${{ steps.vars.outputs.version }}"
          dmgroot="dmg-staging/zehn-${version}"
          mkdir -p "$dmgroot"
          # arm64 binary
          zig build -Doptimize=ReleaseFast -Dtarget=aarch64-macos
          cp zig-out/bin/zehn "$dmgroot/zehn-aarch64"
          # x86_64 binary
          zig build -Doptimize=ReleaseFast -Dtarget=x86_64-macos
          cp zig-out/bin/zehn "$dmgroot/zehn-x86_64"
          [ -f README.md ] && cp README.md "$dmgroot/" || true
          [ -f LICENSE ] && cp LICENSE "$dmgroot/" || true
          dmgname="zehn-${version}-macos.dmg"
          hdiutil create -volname "zehn ${version}" -srcfolder dmg-staging -ov -format UDZO "$dmgname"
          shasum -a 256 "$dmgname" > "$dmgname.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: |
            zehn-*.tar.gz
            zehn-*.tar.gz.sha256
            zehn-*.dmg
            zehn-*.dmg.sha256

  release:
    name: Publish Release
    needs: [linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Move nightly tag
        if: github.ref_type == 'branch'
        run: |
          git tag -f nightly "$GITHUB_SHA"
          git push -f origin nightly

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Compute combined checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum zehn-*.tar.gz zehn-*.dmg > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_type == 'branch' && 'nightly' || github.ref_name }}
          name: ${{ github.ref_type == 'branch' && 'Nightly' || github.ref_name }}
          prerelease: ${{ github.ref_type == 'branch' }}
          make_latest: ${{ github.ref_type == 'branch' && 'false' || 'true' }}
          generate_release_notes: true
          files: |
            dist/zehn-*.tar.gz
            dist/zehn-*.dmg
            dist/checksums.txt
